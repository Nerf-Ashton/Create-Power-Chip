name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Set up commit-based tag
        run: |
          SHORT_SHA=$(git rev-parse --short=5 HEAD)
          TAG_NAME="v$SHORT_SHA"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "tag=$TAG_NAME"

      - name: Publish to GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GH_RELEASE }}
          github-tag: ${{ env.TAG_NAME }}
          github-generate-changelog: true
          github-draft: false
          github-prerelease: false

          name: powerchip-${{ env.TAG_NAME }}
          version: powerchip-${{ env.TAG_NAME }}
          version-type: release
          game-versions: 1.21.1
          loaders: |
            neoforge

          files: |
            build/libs/powerchip-*.jar

          retry-attempts: 2
          retry-delay: 10000